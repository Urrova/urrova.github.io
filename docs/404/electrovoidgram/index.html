<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Electrovoidgram</title>
    <style>
    body{
    background-color: #000;
    color:#FFF;
    }
    canvas{
    text-align: center;
    border: 2px solid #FFF;
    }
    .center{
    text-align: center;
    }
    </style>
</head>
<body>
    <h1>404: The Electrovoidium</h1>
    <p></p>
    <p class="center"><canvas id="electrovoidgram" width="640" height="480" border="1"></canvas></p>

    
</body>

<script>
let EXIT_POINTS = 2
let CLOUDS_OF_ENTHROPY = 4
let DEAD_POINTS = 0

function getRandomInt(min, max) {
    min = Math.ceil(min);
    max = Math.floor(max);
    return Math.floor(Math.random() * (max - min) + min); //The maximum is exclusive and the minimum is inclusive
}

//Draw the electrovoidgram
let canvas = document.getElementById("electrovoidgram")
let ctx = canvas.getContext("2d")

/////////////////////// TEXT /////////////////////////////////
ctx.font = "10px Hack"
ctx.fillStyle = "#FFF"
ctx.fillText("The Temple", 5, 10)
ctx.fillText("Exit Points", 5, 120)
ctx.fillText("Clouds of Enthropy", 5, 200)
ctx.fillText("Dead Points", 5, 400)

/////////////////////// POINTS ///////////////////////////////

//Clouds of Enthropy
ctx.fillStyle = "#0FF"
for (i = 0; i < CLOUDS_OF_ENTHROPY; i++) {
    let x = getRandomInt(220, 420)
    let y = getRandomInt(250, 350)

    ctx.fillRect(x-2, y-2, 4, 4)
}

//Exit Points
let exit_points_spacing = 40
ctx.fillStyle = "#0F0"
for (i = 0; i < EXIT_POINTS; i++) {
    let x = (320 - EXIT_POINTS * (exit_points_spacing/2)) + i * exit_points_spacing;
    let y = 160

    ctx.fillRect(x-2, y-2, 4, 4)
}

//Dead Points
let dead_points_spacing = 80
ctx.fillStyle = "#F00"
for (i = 0; i < DEAD_POINTS; i++) {
    let x = (320 - DEAD_POINTS * (dead_points_spacing/2)) + i * dead_points_spacing;
    let y = 440

    ctx.fillRect(x-2, y-2, 4, 4)
}
</script>

</html>
